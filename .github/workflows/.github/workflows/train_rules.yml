name: Train AI Rules (Daily & Manual)

on:
  # 1. Ручной запуск (кнопка Run Workflow)
  workflow_dispatch:
  
  # 2. Автоматический запуск раз в день (в 03:00 ночи по Москве/UTC)
  # Если пока не надо - можно закомментировать эти две строки
  schedule:
    - cron: '0 0 * * *' 

jobs:
  train_parser_brain:
    runs-on: ubuntu-latest

    steps:
      # Скачиваем код из репозитория
      - name: Checkout code
        uses: actions/checkout@v3

      # Ставим Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Устанавливаем библиотеки (Telethon обязателен!)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon supabase requests

      # Запускаем скрипт
      - name: Run AI Trainer
        env:
          # Телеграм ключи
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          
          # Supabase
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          
          # AI
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        
        # ВАЖНО: Убедись, что файл в репозитории называется именно так
        run: python train_daily_rules.py
