name: Train AI Rules (Daily & Manual)

on:
  # 1. Ручной запуск (Кнопка "Run workflow" в интерфейсе GitHub)
  workflow_dispatch:
  
  # 2. Автоматический запуск по расписанию
  # '0 3 * * *' означает каждый день в 03:00 UTC (06:00 по Москве)
  schedule:
    - cron: '0 3 * * *'

jobs:
  train_parser_brain:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Скачиваем код из твоего репозитория
      - name: Checkout code
        uses: actions/checkout@v3

      # Шаг 2: Настраиваем Python 3.10
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Шаг 3: Устанавливаем библиотеки
      # ВАЖНО: telethon добавлен сюда, чтобы не было ошибки ModuleNotFoundError
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon supabase requests

      # Шаг 4: Запускаем твой скрипт train_ai.py
      # Мы передаем ему секреты из настроек репозитория
      - name: Run AI Trainer
        env:
          # Телеграм (чтобы войти в аккаунт)
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          
          # База данных (куда сохранять JSON)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          
          # Искусственный интеллект (Gemini)
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        
        # Запуск самого файла
        run: python train_ai.py
